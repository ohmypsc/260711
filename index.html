<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>초대합니다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet" />
<style>
:root {
  --paper-bg: #fdfcf9;
  --texture: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  --ink: #2e2b28;
  --muted: #605a54;
  --accent: #c2a36b;
  --border: #e5ddcf;
  --shadow: rgba(0, 0, 0, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(circle at center, #fdfbf8 0%, #f7f4ef 100%);
  font-family: 'Noto Serif KR', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  padding: 24px;
  color: var(--ink);
  overflow: hidden;
}

/* 💌 카드 */
.invite-card {
  position: relative;
  background: var(--paper-bg) var(--texture);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 10px 30px var(--shadow);
  padding: 70px 52px;
  width: 90%;
  max-width: 440px;
  text-align: center;
  transition: transform 0.3s ease;
  z-index: 10;
}
.invite-card::before {
  content: "";
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px solid #d9c9aa;
  border-radius: 14px;
  opacity: 0.6;
}
.invite-card:hover { transform: scale(1.02); }

/* 🌸 이름 은은한 금빛 흐름 */
.names {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: 1.6px;
  margin-bottom: 16px;
  background: linear-gradient(90deg, #bfa46b 0%, #f0e2b0 50%, #bfa46b 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% auto;
  animation: shimmer 6s ease-in-out infinite;
}

@keyframes shimmer {
  0% { background-position: 0% center; }
  50% { background-position: 100% center; }
  100% { background-position: 0% center; }
}

/* 💍 결혼합니다 */
.subtitle {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.2rem;
  color: #9a8454;
  margin-bottom: 38px;
  letter-spacing: 1px;
}

/* 📅 정보 */
.info {
  font-size: 1.3rem;
  line-height: 2.4rem;
  color: var(--muted);
  margin-top: 8px;
  word-break: keep-all;
}
.info strong {
  color: var(--ink);
  font-weight: 700;
}

/* 구분 간격 */
.section {
  margin-bottom: 28px;
}

/* 💌 하단 안내 */
.footer {
  margin-top: 60px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  font-size: 1.3rem;
  color: var(--accent);
  font-weight: 700;
  cursor: pointer;
  line-height: 1.8;
  transition: all 0.3s ease;
  white-space: nowrap;
  text-align: center;
}
.footer:hover {
  color: #b89455;
  text-shadow: 0 0 10px rgba(194,163,107,0.3);
}

/* 🌸 캔버스 */
canvas.petal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* 📱 모바일 대응 */
@media (max-width: 480px) {
  .invite-card { padding: 54px 28px; }
  .names { font-size: 1.8rem; letter-spacing: 1.4px; }
  .subtitle { font-size: 1rem; margin-bottom: 28px; }
  .info { font-size: 1.1rem; line-height: 2.1rem; }
  .footer { font-size: 1.1rem; margin-top: 40px; padding-top: 22px; }
}
</style>
</head>
<body>

<div id="inviteCard" class="invite-card">
  <div class="names">백승철 · 오미영</div>
  <div class="subtitle">결혼합니다</div>

  <div class="info">
    <div class="section">
      <strong>2026년 7월 11일 토요일</strong><br />
      <strong>오전 11시</strong>
    </div>
    <div class="section">
      <strong>유성컨벤션웨딩홀</strong><br />
      <strong>3층 그랜드홀</strong>
    </div>
  </div>

  <div class="footer">카드를 눌러 청첩장을 확인해 보세요</div>
</div>

<canvas class="petal"></canvas>

<script>
const redirectUrl = "https://ohmypsc.github.io/260711-main";
const card = document.getElementById("inviteCard");
const canvas = document.querySelector(".petal");
const ctx = canvas.getContext("2d");
const petalImg = new Image();
petalImg.src = "./petal.png";

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let petals = [];
let animation;

/* 🌸 중앙에서 위쪽으로 풍성하게 퍼지는 꽃잎 */
function createBurst(centerX, centerY) {
  petals = [];
  const count = 700; // 풍성함 UP (420 → 700)
  const maxSpeed = 16; // 확산 속도 증가
  const spread = Math.PI; // 위쪽 반구

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * spread - spread / 2;
    const speed = 3 + Math.random() * maxSpeed;
    petals.push({
      x: centerX,
      y: centerY,
      w: 16 + Math.random() * 16,
      h: 12 + Math.random() * 10,
      xSpeed: Math.cos(angle) * speed * (0.8 + Math.random() * 0.6),
      ySpeed: Math.sin(angle) * speed * 1.6,
      rot: Math.random() * 2 * Math.PI,
      rotSpeed: (Math.random() - 0.5) * 0.35,
      gravity: 0.015 + Math.random() * 0.045,
      opacity: 1
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  petals.forEach(p => {
    p.x += p.xSpeed;
    p.y += p.ySpeed;
    p.ySpeed += p.gravity;
    p.rot += p.rotSpeed;
    p.opacity -= 0.003; // 더 천천히 사라짐
    ctx.globalAlpha = Math.max(p.opacity, 0);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.drawImage(petalImg, -p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  petals = petals.filter(p => p.opacity > 0);
  if (petals.length > 0) animation = requestAnimationFrame(draw);
}

card.addEventListener("click", () => {
  const rect = card.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  if (animation) cancelAnimationFrame(animation);
  createBurst(centerX, centerY);
  draw();

  setTimeout(() => window.location.href = redirectUrl, 2600);
});
</script>

</body>
</html>
