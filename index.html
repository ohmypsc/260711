<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>초대합니다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet" />
<style>
:root {
  --paper-bg: #fdfcf9;
  --texture: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  --ink: #2e2b28;
  --muted: #605a54;
  --accent: #c2a36b;
  --border: #e5ddcf;
  --shadow: rgba(0, 0, 0, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(circle at center, #fdfbf8 0%, #f7f4ef 100%);
  font-family: 'Noto Serif KR', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  padding: 24px;
  color: var(--ink);
  overflow: hidden;
}

/* 💌 카드 */
.invite-card {
  position: relative;
  background: var(--paper-bg) var(--texture);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 10px 30px var(--shadow);
  padding: 70px 52px;
  max-width: 470px;
  width: 100%;
  text-align: center;
  transition: transform 0.3s ease;
  z-index: 10;
}
.invite-card::before {
  content: "";
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px solid #d9c9aa;
  border-radius: 14px;
  opacity: 0.6;
}
.invite-card:hover { transform: scale(1.02); }

/* 🌸 상단 아이콘 (고급스러운 SVG + 은은한 빛 효과) */
.flower-icon {
  width: 60px;
  height: 60px;
  margin: 0 auto 24px;
  animation: glow 3.5s ease-in-out infinite alternate;
}
@keyframes glow {
  0% { opacity: 0.8; filter: drop-shadow(0 0 2px #c2a36b); transform: scale(1);}
  100% { opacity: 1; filter: drop-shadow(0 0 8px #e9cf91); transform: scale(1.05);}
}

/* 이름 */
.names {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1.9rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 1.4px;
  margin-bottom: 22px;
}

/* 구분선 */
.divider {
  width: 46px;
  height: 1.8px;
  background: var(--accent);
  margin: 0 auto 40px;
  opacity: 0.9;
}

/* 정보 */
.info-line {
  font-size: 1.25rem;
  line-height: 2.4;
  color: var(--muted);
  margin-bottom: 8px;
}
.info-label {
  color: var(--ink);
  font-weight: 600;
  margin-right: 10px;
}

/* 💌 하단 버튼 */
.footer {
  margin-top: 54px;
  padding-top: 26px;
  border-top: 1px solid var(--border);
  font-size: 1.3rem;
  color: var(--accent);
  font-weight: 600;
  cursor: pointer;
  line-height: 1.6;
  transition: color 0.3s ease;
  word-break: keep-all;
  white-space: normal;
}
.footer:hover { color: #b89455; }

/* 🌸 전역 캔버스 (화면 전체) */
canvas.petal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* 📱 모바일 대응 */
@media (max-width: 480px) {
  .invite-card { padding: 54px 28px; }
  .names { font-size: 1.6rem; }
  .info-line { font-size: 1.1rem; }
  .footer {
    font-size: 1.2rem;
    margin-top: 40px;
    padding-top: 22px;
    line-height: 1.7;
  }
}
</style>
</head>
<body>

<div id="inviteCard" class="invite-card">
  <div class="flower-icon">
    <!-- ✨ 금빛 벚꽃 SVG -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" stroke="#c2a36b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
      <path d="M256 32c30 60 30 120 0 180-30-60-30-120 0-180zM256 480c-30-60-30-120 0-180 30 60 30 120 0 180zM32 256c60-30 120-30 180 0-60 30-120 30-180 0zM480 256c-60 30-120 30-180 0 60-30 120-30 180 0zM128 128c45 45 90 90 0 0 45-45 90-45 135 0-45 45-90 45-135 0zM384 384c-45-45-90-90 0 0-45 45-90 45-135 0 45-45 90-45 135 0z"/>
    </svg>
  </div>

  <div class="names">백승철 · 오미영</div>
  <div class="divider"></div>

  <div class="info-line"><span class="info-label">날짜</span>2026년 7월 11일 (토)</div>
  <div class="info-line"><span class="info-label">시간</span>오전 11시</div>
  <div class="info-line"><span class="info-label">장소</span>유성컨벤션웨딩홀</div>
  <div class="info-line"><span class="info-label">홀</span>3층 그랜드홀</div>

  <div class="footer">
    💌<br />
    카드를 눌러서 <br />청첩장을 확인해 보세요 <br />💌
  </div>
</div>

<canvas class="petal"></canvas>

<script>
const redirectUrl = "https://ohmypsc.github.io/260711-main";

const card = document.getElementById("inviteCard");
const canvas = document.querySelector(".petal");
const ctx = canvas.getContext("2d");
const petalImg = new Image();
petalImg.src = "./petal.png";

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let petals = [];
let animation;

function createBurst(centerX, centerY) {
  petals = [];
  const count = 130;
  const radius = 100;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * radius;
    petals.push({
      x: centerX + Math.cos(angle) * r,
      y: centerY + Math.sin(angle) * r,
      w: 20 + Math.random() * 12,
      h: 14 + Math.random() * 8,
      xSpeed: (Math.random() - 0.5) * 12,
      ySpeed: (Math.random() - 1.2) * 9,
      rot: Math.random() * 2 * Math.PI,
      rotSpeed: (Math.random() - 0.5) * 0.25,
      gravity: 0.05 + Math.random() * 0.08,
      opacity: 1
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  petals.forEach(p => {
    p.x += p.xSpeed;
    p.y += p.ySpeed;
    p.ySpeed += p.gravity;
    p.rot += p.rotSpeed;
    p.opacity -= 0.006;
    ctx.globalAlpha = Math.max(p.opacity, 0);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.drawImage(petalImg, -p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  petals = petals.filter(p => p.opacity > 0);
  if (petals.length > 0) animation = requestAnimationFrame(draw);
}

card.addEventListener("click", (e) => {
  const rect = card.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  if (animation) cancelAnimationFrame(animation);
  createBurst(centerX, centerY);
  draw();

  setTimeout(() => window.location.href = redirectUrl, 2000);
});
</script>

</body>
</html>
