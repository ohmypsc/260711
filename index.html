<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>초대합니다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet" />
<style>
:root {
  /* ✨ 고급스러운 로즈골드톤 팔레트 */
  --paper-bg: #fdfbf9;
  --texture: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  --ink: #1f1414; /* 더 진한 본문 글씨 */
  --muted: #5a4443; /* 살짝 더 어두운 보조 텍스트 */
  --accent: #d2a2a0;
  --accent-mid: #e0b2a8;
  --accent-light: #f5d2c8;
  --border: #ead4d1;
  --shadow: rgba(0, 0, 0, 0.08);
  --petal-filter: none;
}

/* 기본 세팅 */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(circle at center, #fcf9f7 0%, #f7f3f2 100%);
  font-family: 'Noto Serif KR', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  padding: 24px;
  color: var(--ink);
  overflow: hidden;
  transition: background 0.5s ease, color 0.5s ease;
}

/* 💌 카드 */
.invite-card {
  position: relative;
  background: var(--paper-bg) var(--texture);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 12px 35px var(--shadow);
  padding: 70px 52px;
  width: 90%;
  max-width: 440px;
  text-align: center;
  transition: transform 0.3s ease, background-color 0.5s ease;
  z-index: 10;
}
.invite-card::before {
  content: "";
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px solid #d8b1aa;
  border-radius: 14px;
  opacity: 0.6;
}
.invite-card:hover { transform: scale(1.02); }

/* 🌸 이름 - 금속성 로즈골드 광택 */
.names {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: 1.6px;
  margin-bottom: 16px;
  background: linear-gradient(120deg,
    #c98f8a 0%,
    #e9c2b8 25%,
    #f6d9d0 50%,
    #e1b5aa 75%,
    #c98f8a 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 300% auto;
  animation: shimmer 6s ease-in-out infinite;
}

@keyframes shimmer {
  0% { background-position: 0% center; }
  50% { background-position: 100% center; }
  100% { background-position: 0% center; }
}

/* 💍 결혼합니다 */
.subtitle {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.2rem;
  color: var(--accent);
  margin-bottom: 38px;
  letter-spacing: 1px;
}

/* 📅 정보 */
.info {
  font-size: 1.4rem;
  line-height: 2.6rem;
  color: var(--muted);
  margin-top: 12px;
  word-break: keep-all;
}
.info strong {
  color: var(--ink);
  font-weight: 700;
}

/* 구분 간격 */
.section {
  margin-bottom: 30px;
}

/* 💌 하단 안내 */
.footer {
  margin-top: 60px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  font-size: 1.3rem;
  color: var(--accent);
  font-weight: 700;
  cursor: pointer;
  line-height: 1.8;
  transition: all 0.3s ease;
  white-space: normal;
  text-align: center;
}
.footer:hover {
  color: #b87d7d;
  text-shadow: 0 0 10px rgba(214,160,160,0.4);
}

/* 🌸 캔버스 */
canvas.petal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  filter: var(--petal-filter);
}

/* 📱 모바일 대응 */
@media (max-width: 480px) {
  .invite-card { padding: 54px 28px; }
  .names { font-size: 1.8rem; letter-spacing: 1.4px; }
  .subtitle { font-size: 1rem; margin-bottom: 28px; }
  .info { font-size: 1.15rem; line-height: 2.3rem; }
  .footer {
    font-size: 1.1rem;
    margin-top: 40px;
    padding-top: 22px;
  }
}

/* 🌙 다크모드 - 질감은 은은하게만 */
@media (prefers-color-scheme: dark) {
  :root {
    --paper-bg: #272222;
    --texture: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
    --ink: #f6f5f4;
    --muted: #cabbb8;
    --accent: #dca8a0;
    --accent-light: #f1c2b8;
    --border: #3c2e2e;
    --shadow: rgba(0, 0, 0, 0.8);
  }

  body {
    background: radial-gradient(circle at center, #1d1717 0%, #0e0b0b 100%);
    color: var(--ink);
  }

  .invite-card {
    background: var(--paper-bg);
    background-image: linear-gradient(
        rgba(39, 34, 34, 0.97),
        rgba(39, 34, 34, 0.97)
      ),
      var(--texture);
    background-blend-mode: soft-light; /* 🌙 은은한 질감 */
    border: 1px solid var(--border);
    box-shadow: 0 10px 35px var(--shadow);
  }

  .names {
    background: linear-gradient(120deg,
      #f2c5bc 0%,
      #d99d91 30%,
      #f7d0c8 50%,
      #d18a80 75%,
      #f2c5bc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 10px rgba(250, 200, 200, 0.5);
  }

  .subtitle {
    color: var(--accent-light);
  }

  .info {
    color: var(--muted);
  }

  .footer {
    color: var(--accent-light);
    border-top: 1px solid var(--border);
    text-shadow: 0 0 10px rgba(250, 200, 200, 0.4);
  }
}
</style>
</head>

<body>
  <div id="inviteCard" class="invite-card">
    <div class="names">백승철 · 오미영</div>
    <div class="subtitle">결혼합니다</div>

    <div class="info">
      <div class="section">
        <strong>2026년 7월 11일 토요일</strong><br />
        <strong>오전 11시</strong>
      </div>
      <div class="section">
        <strong>유성컨벤션웨딩홀</strong><br />
        <strong>3층 그랜드홀</strong>
      </div>
    </div>

    <div class="footer">카드를 눌러서 <br />청첩장을 확인해 보세요</div>
  </div>

  <canvas class="petal"></canvas>

  <script>
  const redirectUrl = "https://ohmypsc.github.io/260711-main";
  const card = document.getElementById("inviteCard");
  const canvas = document.querySelector(".petal");
  const ctx = canvas.getContext("2d");
  const petalImg = new Image();
  petalImg.src = "./petal.png";

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  let petals = [];
  let animation;

  function createBurst() {
    petals = [];
    const count = 400;
    const radius = 180;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * radius;
      petals.push({
        x: window.innerWidth / 2 + Math.cos(angle) * r,
        y: window.innerHeight / 2 + Math.sin(angle) * r,
        w: 20 + Math.random() * 12,
        h: 14 + Math.random() * 8,
        xSpeed: (Math.random() - 0.5) * 8,
        ySpeed: (Math.random() - 1.1) * 5,
        rot: Math.random() * 2 * Math.PI,
        rotSpeed: (Math.random() - 0.5) * 0.25,
        gravity: 0.05 + Math.random() * 0.08,
        opacity: 1
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    petals.forEach(p => {
      p.x += p.xSpeed;
      p.y += p.ySpeed;
      p.ySpeed += p.gravity;
      p.rot += p.rotSpeed;
      p.opacity -= 0.0035;
      ctx.globalAlpha = Math.max(p.opacity, 0);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.drawImage(petalImg, -p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    petals = petals.filter(p => p.opacity > 0);
    if (petals.length > 0) animation = requestAnimationFrame(draw);
  }

  card.addEventListener("click", () => {
    if (animation) cancelAnimationFrame(animation);
    createBurst();
    draw();
    setTimeout(() => (window.location.href = redirectUrl), 2600);
  });
  </script>
</body>
</html>
