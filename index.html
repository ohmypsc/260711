<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>초대합니다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet" />
<style>
:root {
  --paper-bg: #fdfcf9;
  --texture: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  --ink: #2e2b28;
  --muted: #5a544d;
  --accent: #b9935a;
  --border: #e5ddcf;
  --shadow: rgba(0, 0, 0, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(circle at center, #fdfbf8 0%, #f7f4ef 100%);
  font-family: 'Noto Serif KR', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  padding: 24px;
  color: var(--ink);
  overflow: hidden;
}

/* 💌 카드 */
.invite-card {
  position: relative;
  background: var(--paper-bg) var(--texture);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 10px 30px var(--shadow);
  padding: 70px 52px;
  width: 90%;              /* 📱 화면 비율에 맞게 반응형 */
  max-width: 520px;        /* 💻 너무 커지지 않게 제한 */
  margin: 0 auto;          /* 항상 가운데 정렬 */
  text-align: center;
  transition: transform 0.3s ease;
  z-index: 10;
}
.invite-card::before {
  content: "";
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px solid #d9c9aa;
  border-radius: 14px;
  opacity: 0.6;
}
.invite-card:hover { transform: scale(1.02); }

/* 🌸 이름 (은은한 금빛 흐름) */
.names {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 2.1rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1.2px;
  margin-bottom: 8px;
  background: linear-gradient(90deg, #b9965e 0%, #e8d3a4 50%, #b9965e 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 300% auto;
  animation: shimmer 6s ease-in-out infinite;
  white-space: nowrap;
}

@keyframes shimmer {
  0% { background-position: 0% center; }
  50% { background-position: 100% center; }
  100% { background-position: 0% center; }
}

/* 💍 결혼합니다 */
.subtitle {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.25rem;
  color: #9a8454;
  margin-bottom: 32px;
  letter-spacing: 1px;
}

/* 📅 시간 / 장소 (심플, 동일 디자인) */
.info {
  font-size: 1.4rem;
  line-height: 2.4rem;
  color: var(--ink);
  font-weight: 600;
  margin-top: 14px;
  letter-spacing: 0.3px;
}

/* 안내문 */
.footer {
  margin-top: 60px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  font-size: 1.4rem;
  color: var(--accent);
  font-weight: 700;
  cursor: pointer;
  line-height: 1.8;
  transition: all 0.3s ease;
}
.footer:hover {
  color: #b89455;
  text-shadow: 0 0 10px rgba(194,163,107,0.3);
}

/* 🌸 전역 캔버스 */
canvas.petal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* 📱 모바일 대응 */
@media (max-width: 480px) {
  body { padding: 16px; }
  .invite-card { padding: 48px 24px; width: 92%; }
  .names { font-size: 1.8rem; }
  .subtitle { font-size: 1.1rem; margin-bottom: 24px; }
  .info { font-size: 1.2rem; line-height: 2.1rem; }
  .footer {
    font-size: 1.25rem;
    margin-top: 46px;
    padding-top: 22px;
  }
}
</style>
</head>
<body>

<div id="inviteCard" class="invite-card">
  <div class="names">백승철 · 오미영</div>
  <div class="subtitle">결혼합니다</div>

  <div class="info">
    2026년 7월 11일 토요일 오전 11시<br/>
    유성컨벤션웨딩홀 3층 그랜드홀
  </div>

  <div class="footer">
    카드를 눌러서 청첩장을 확인해 보세요
  </div>
</div>

<canvas class="petal"></canvas>

<script>
const redirectUrl = "https://ohmypsc.github.io/260711-main";

const card = document.getElementById("inviteCard");
const canvas = document.querySelector(".petal");
const ctx = canvas.getContext("2d");
const petalImg = new Image();
petalImg.src = "./petal.png";

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let petals = [];
let animation;

function createBurst(centerX, centerY) {
  petals = [];
  const count = 240;
  const radius = 180;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * radius;
    petals.push({
      x: centerX + Math.cos(angle) * r,
      y: centerY + Math.sin(angle) * r,
      w: 18 + Math.random() * 16,
      h: 12 + Math.random() * 10,
      xSpeed: (Math.random() - 0.5) * 18,
      ySpeed: (Math.random() - 1.3) * 14,
      rot: Math.random() * 2 * Math.PI,
      rotSpeed: (Math.random() - 0.5) * 0.4,
      gravity: 0.04 + Math.random() * 0.09,
      opacity: 1
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  petals.forEach(p => {
    p.x += p.xSpeed;
    p.y += p.ySpeed;
    p.ySpeed += p.gravity;
    p.rot += p.rotSpeed;
    p.opacity -= 0.005;
    ctx.globalAlpha = Math.max(p.opacity, 0);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.drawImage(petalImg, -p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  petals = petals.filter(p => p.opacity > 0);
  if (petals.length > 0) animation = requestAnimationFrame(draw);
}

card.addEventListener("click", () => {
  const rect = card.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  if (animation) cancelAnimationFrame(animation);
  createBurst(centerX, centerY);
  draw();

  setTimeout(() => window.location.href = redirectUrl, 2200);
});
</script>

</body>
</html>
