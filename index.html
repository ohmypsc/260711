<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>초대합니다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet" />
<style>
:root {
  --paper-bg: #fdfcf9;
  --texture: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  --ink: #2e2b28;
  --muted: #605a54;
  --accent: #c2a36b;
  --border: #e5ddcf;
  --shadow: rgba(0, 0, 0, 0.08);
  --petal-filter: none; /* 🌸 꽃잎 색상 고정 */
}

/* 기본 세팅 */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(circle at center, #fdfbf8 0%, #f7f4ef 100%);
  font-family: 'Noto Serif KR', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  padding: 24px;
  color: var(--ink);
  overflow: hidden;
  transition: background 0.5s ease, color 0.5s ease;
}

/* 💌 카드 */
.invite-card {
  position: relative;
  background: var(--paper-bg) var(--texture);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 12px 35px var(--shadow);
  padding: 70px 52px;
  width: 90%;
  max-width: 440px;
  text-align: center;
  transition: transform 0.3s ease, background-color 0.5s ease;
  z-index: 10;
}
.invite-card::before {
  content: "";
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px solid #d9c9aa;
  border-radius: 14px;
  opacity: 0.6;
}
.invite-card:hover { transform: scale(1.02); }

/* 🌸 이름 은은한 금빛 흐름 */
.names {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: 1.6px;
  margin-bottom: 16px;
  background: linear-gradient(90deg, #bfa46b 0%, #f0e2b0 50%, #bfa46b 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% auto;
  animation: shimmer 6s ease-in-out infinite;
}

@keyframes shimmer {
  0% { background-position: 0% center; }
  50% { background-position: 100% center; }
  100% { background-position: 0% center; }
}

/* 💍 결혼합니다 */
.subtitle {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.2rem;
  color: #9a8454;
  margin-bottom: 38px;
  letter-spacing: 1px;
}

/* 📅 정보 */
.info {
  font-size: 1.3rem;
  line-height: 2.4rem;
  color: var(--muted);
  margin-top: 8px;
  word-break: keep-all;
}
.info strong {
  color: var(--ink);
  font-weight: 700;
}

/* 구분 간격 */
.section {
  margin-bottom: 28px;
}

/* 💌 하단 안내 */
.footer {
  margin-top: 60px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  font-size: 1.3rem;
  color: var(--accent);
  font-weight: 700;
  cursor: pointer;
  line-height: 1.8;
  transition: all 0.3s ease;
  white-space: normal;
  text-align: center;
}
.footer:hover {
  color: #b89455;
  text-shadow: 0 0 10px rgba(194,163,107,0.3);
}

/* 🌸 캔버스 */
canvas.petal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  filter: var(--petal-filter);
}

/* 📱 모바일 대응 */
@media (max-width: 480px) {
  .invite-card { padding: 54px 28px; }
  .names { font-size: 1.8rem; letter-spacing: 1.4px; }
  .subtitle { font-size: 1rem; margin-bottom: 28px; }
  .info { font-size: 1.1rem; line-height: 2.1rem; }
  .footer {
    font-size: 1.1rem;
    margin-top: 40px;
    padding-top: 22px;
  }
}

/* 🌙 다크모드 대응 (🌸 꽃잎은 동일 유지) */
@media (prefers-color-scheme: dark) {
  :root {
    --paper-bg: #2b2a28;
    --ink: #f8f7f6;
    --muted: #d0cfcc;
    --accent: #d9c07b;
    --border: #3e3a36;
    --shadow: rgba(0, 0, 0, 0.7);
    --petal-filter: none; /* ✅ 다크모드에서도 동일 유지 */
  }

  body {
    background: radial-gradient(circle at center, #1a1918 0%, #0f0f0f 100%);
    color: var(--ink);
  }

  .invite-card {
    background: var(--paper-bg) var(--texture);
    border: 1px solid var(--border);
    box-shadow: 0 10px 35px var(--shadow);
  }

  .names {
    background: linear-gradient(90deg, #e6cc8f 0%, #f9eec1 50%, #e6cc8f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 8px rgba(240, 220, 150, 0.5);
  }

  .subtitle {
    color: #c5ae75;
  }

  .info {
    color: var(--muted);
  }

  .footer {
    color: var(--accent);
    border-top: 1px solid var(--border);
    text-shadow: 0 0 8px rgba(220, 200, 150, 0.4);
  }
}
</style>
</head>

<body>
  <div id="inviteCard" class="invite-card">
    <div class="names">백승철 · 오미영</div>
    <div class="subtitle">결혼합니다</div>

    <div class="info">
      <div class="section">
        <strong>2026년 7월 11일 토요일</strong><br />
        <strong>오전 11시</strong>
      </div>
      <div class="section">
        <strong>유성컨벤션웨딩홀</strong><br />
        <strong>3층 그랜드홀</strong>
      </div>
    </div>

    <div class="footer">카드를 눌러서 <br />청첩장을 확인해 보세요</div>
  </div>

  <canvas class="petal"></canvas>

  <script>
  const redirectUrl = "https://ohmypsc.github.io/260711-main";
  const card = document.getElementById("inviteCard");
  const canvas = document.querySelector(".petal");
  const ctx = canvas.getContext("2d");
  const petalImg = new Image();
  petalImg.src = "./petal.png";

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  let petals = [];
  let animation;

  /* 🌸 풍성하게 터지는 꽃잎 */
  function createBurst() {
    petals = [];
    const count = 400;
    const radius = 180;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * radius;
      petals.push({
        x: window.innerWidth / 2 + Math.cos(angle) * r,
        y: window.innerHeight / 2 + Math.sin(angle) * r,
        w: 20 + Math.random() * 12,
        h: 14 + Math.random() * 8,
        xSpeed: (Math.random() - 0.5) * 8,
        ySpeed: (Math.random() - 1.1) * 5,
        rot: Math.random() * 2 * Math.PI,
        rotSpeed: (Math.random() - 0.5) * 0.25,
        gravity: 0.05 + Math.random() * 0.08,
        opacity: 1
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    petals.forEach(p => {
      p.x += p.xSpeed;
      p.y += p.ySpeed;
      p.ySpeed += p.gravity;
      p.rot += p.rotSpeed;
      p.opacity -= 0.0035;
      ctx.globalAlpha = Math.max(p.opacity, 0);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.drawImage(petalImg, -p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    petals = petals.filter(p => p.opacity > 0);
    if (petals.length > 0) animation = requestAnimationFrame(draw);
  }

  /* ✅ 클릭 시 터지고 이동 */
  card.addEventListener("click", () => {
    if (animation) cancelAnimationFrame(animation);
    createBurst();
    draw();
    setTimeout(() => (window.location.href = redirectUrl), 2600);
  });
  </script>
</body>
</html>
